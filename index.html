<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface-alt: #f8f9fb;
      --border: #e4e7ec;
      --text: #111827;
      --text-muted: #6b7280;
      --green: #16a34a;
      --green-bg: #dcfce7;
      --red: #dc2626;
      --red-bg: #fee2e2;
      --blue: #2563eb;
      --blue-bg: #dbeafe;
      --radius: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -.5px;
      color: var(--text);
    }
    header p {
      color: var(--text-muted);
      font-size: .9rem;
      margin-top: 4px;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Balance card ── */
    .balance-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 24px 24px;
      text-align: center;
    }
    .balance-label {
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .balance-amount {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1.5px;
      transition: color .3s;
    }
    .balance-amount.positive { color: var(--green); }
    .balance-amount.negative { color: var(--red); }
    .balance-amount.zero     { color: var(--text-muted); }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    .stat {
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .stat.income { background: var(--green-bg); }
    .stat.expense { background: var(--red-bg); }
    .stat-icon {
      font-size: 1.3rem;
      line-height: 1;
    }
    .stat-info { display: flex; flex-direction: column; }
    .stat-label {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-muted);
    }
    .stat-value {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -.5px;
    }
    .stat.income .stat-value { color: var(--green); }
    .stat.expense .stat-value { color: var(--red); }

    /* ── Add entry form ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    .type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .type-btn {
      padding: 10px;
      border-radius: 9px;
      border: 2px solid var(--border);
      background: var(--surface-alt);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      color: var(--text-muted);
    }
    .type-btn.active.income {
      border-color: var(--green);
      background: var(--green-bg);
      color: var(--green);
    }
    .type-btn.active.expense {
      border-color: var(--red);
      background: var(--red-bg);
      color: var(--red);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    input, select {
      padding: 10px 12px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: var(--surface-alt);
      font-size: .95rem;
      color: var(--text);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
      font-family: inherit;
      width: 100%;
    }
    input:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    .add-btn {
      margin-top: 14px;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: -.2px;
      transition: background .18s, transform .1s;
      font-family: inherit;
    }
    .add-btn:hover { background: #1d4ed8; }
    .add-btn:active { transform: scale(.98); }

    /* ── Transactions list ── */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .clear-btn {
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-family: inherit;
      transition: background .15s, color .15s;
    }
    .clear-btn:hover { background: var(--red-bg); color: var(--red); }

    .empty-state {
      text-align: center;
      padding: 36px 0;
      color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-state p { font-size: .9rem; }

    .tx-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tx-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--surface-alt);
      border-radius: 10px;
      border: 1.5px solid var(--border);
      transition: border-color .15s;
      animation: slideIn .2s ease;
    }
    .tx-item:hover { border-color: #d0d5dd; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tx-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .tx-icon.income  { background: var(--green-bg); }
    .tx-icon.expense { background: var(--red-bg); }

    .tx-meta { flex: 1; min-width: 0; }
    .tx-desc {
      font-size: .95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tx-detail {
      font-size: .78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .tx-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .tx-amount {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -.3px;
    }
    .tx-amount.income  { color: var(--green); }
    .tx-amount.expense { color: var(--red); }

    .del-btn {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 1rem;
      transition: background .15s, color .15s;
    }
    .del-btn:hover { background: var(--red-bg); color: var(--red); }

    /* ── Monthly groups ── */
    .month-group { margin-bottom: 1.25rem; }
    .month-group:last-child { margin-bottom: 0; }

    .month-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0.55rem 1rem;
      background: var(--surface-alt);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      margin-bottom: 6px;
    }

    .month-label {
      font-size: .85rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.2px;
    }

    .month-stats {
      display: flex;
      gap: 12px;
      font-size: .78rem;
      font-weight: 600;
    }
    .ms-income  { color: var(--green); }
    .ms-expense { color: var(--red); }
    .ms-net     { color: var(--text-muted); }
    .ms-net.positive { color: var(--green); }
    .ms-net.negative { color: var(--red); }

    /* ── Recurring notification banner ── */
    .rec-banner {
      max-width: 640px;
      margin: 0 auto 16px;
      padding: 12px 16px;
      background: var(--green-bg);
      border: 1.5px solid var(--green);
      border-radius: var(--radius);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: .9rem;
      color: #14532d;
      font-weight: 600;
    }
    .rec-banner-text { flex: 1; line-height: 1.5; }
    .rec-dismiss {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--green);
      font-size: 1.1rem;
      line-height: 1;
      flex-shrink: 0;
      padding: 2px;
    }
    .rec-dismiss:hover { opacity: .7; }

    /* ── Transaction tabs ── */
    .tx-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .tx-tab {
      padding: 7px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface-alt);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: all .15s;
      font-family: inherit;
    }
    .tx-tab.active {
      border-color: var(--blue);
      background: var(--blue-bg);
      color: var(--blue);
    }

    /* ── Recurring settings card ── */
    .rec-card-head {
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0;
    }
    .rec-card-head.open { margin-bottom: 16px; }
    .rec-chevron { font-size: .9rem; color: var(--text-muted); transition: transform .2s; }
    .rec-chevron.open { transform: rotate(90deg); }

    .rec-section {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .rec-section:last-child { margin-bottom: 0; }
    .rec-section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .rec-section-title { font-size: .92rem; font-weight: 700; }
    .rec-enable {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .83rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
    }
    .rec-enable input { width: auto; }

    .save-rec-btn {
      margin-top: 12px;
      padding: 9px 18px;
      border-radius: 9px;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }
    .save-rec-btn:hover { background: #1d4ed8; }
    .save-rec-btn.success { background: var(--green); }

    /* Other recurring rules list */
    .rec-rule-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      background: var(--surface-alt);
      border-radius: 8px;
      border: 1.5px solid var(--border);
      margin-bottom: 6px;
      font-size: .88rem;
    }
    .rec-rule-info { flex: 1; min-width: 0; }
    .rec-rule-label { font-weight: 600; }
    .rec-rule-meta { font-size: .77rem; color: var(--text-muted); margin-top: 2px; }
    .rec-rule-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .rec-edit-btn, .rec-del-btn {
      width: 28px; height: 28px;
      border-radius: 7px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: .95rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: background .15s, color .15s;
    }
    .rec-edit-btn:hover { background: var(--blue-bg); color: var(--blue); }
    .rec-del-btn:hover  { background: var(--red-bg);  color: var(--red); }

    .rec-add-form {
      border-top: 1.5px solid var(--border);
      margin-top: 12px;
      padding-top: 12px;
    }
    .rec-add-title {
      font-size: .78rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<!-- Recurring notification banner (hidden until triggered) -->
<div id="rec-banner" class="rec-banner" style="display:none">
  <span class="rec-banner-text" id="rec-banner-text"></span>
  <button class="rec-dismiss" onclick="dismissBanner()" title="Dismiss">✕</button>
</div>

<header>
  <h1>Budget Tracker</h1>
  <p>Keep tabs on your income &amp; expenses</p>
</header>

<div class="container">

  <!-- Balance -->
  <div class="balance-card">
    <div class="balance-label">Current Balance</div>
    <div class="balance-amount zero" id="balance">$0.00</div>
    <div class="stats">
      <div class="stat income">
        <div class="stat-icon">↑</div>
        <div class="stat-info">
          <span class="stat-label">Income</span>
          <span class="stat-value" id="total-income">$0.00</span>
        </div>
      </div>
      <div class="stat expense">
        <div class="stat-icon">↓</div>
        <div class="stat-info">
          <span class="stat-label">Expenses</span>
          <span class="stat-value" id="total-expense">$0.00</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Entry -->
  <div class="card">
    <div class="card-title">Add Transaction</div>

    <div class="type-toggle">
      <button class="type-btn active income" id="btn-income" onclick="setType('income')">
        ↑ Income
      </button>
      <button class="type-btn expense" id="btn-expense" onclick="setType('expense')">
        ↓ Expense
      </button>
    </div>

    <div class="form-grid">
      <div class="form-group full">
        <label for="desc">Description</label>
        <input type="text" id="desc" placeholder="e.g. Freelance payment" maxlength="60" />
      </div>
      <div class="form-group">
        <label for="amount">Amount ($)</label>
        <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" />
      </div>
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category"></select>
      </div>
    </div>

    <button class="add-btn" onclick="addEntry()">Add Transaction</button>
  </div>

  <!-- Recurring Settings -->
  <div class="card">
    <div class="card-title rec-card-head" id="rec-card-head" onclick="toggleRecurringPanel()">
      <span>🔁 Recurring Transactions</span>
      <span class="rec-chevron" id="rec-chevron">▸</span>
    </div>
    <div id="rec-panel" style="display:none">

      <!-- Salary -->
      <div class="rec-section">
        <div class="rec-section-head">
          <span class="rec-section-title">💼 Salary</span>
          <label class="rec-enable">
            <input type="checkbox" id="salary-enabled"> Enable
          </label>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="salary-label">Label</label>
            <input type="text" id="salary-label" placeholder="Salary" maxlength="40" />
          </div>
          <div class="form-group">
            <label for="salary-amount">Amount ($)</label>
            <input type="number" id="salary-amount" placeholder="0.00" min="0.01" step="0.01" />
          </div>
          <div class="form-group full">
            <label for="salary-timing">When to add each month</label>
            <select id="salary-timing" onchange="updateSalaryTimingUI()">
              <option value="last-working-day">Last working day (Mon–Fri)</option>
              <option value="specific-day">Specific day of month</option>
            </select>
          </div>
          <div class="form-group" id="salary-day-group" style="display:none">
            <label for="salary-day">Day of month</label>
            <input type="number" id="salary-day" min="1" max="31" placeholder="25" />
          </div>
        </div>
        <button class="save-rec-btn" id="salary-save-btn" onclick="saveSalary()">Save Salary</button>
      </div>

      <!-- Rent -->
      <div class="rec-section">
        <div class="rec-section-head">
          <span class="rec-section-title">🏠 Rent</span>
          <label class="rec-enable">
            <input type="checkbox" id="rent-enabled"> Enable
          </label>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="rent-amount">Amount ($)</label>
            <input type="number" id="rent-amount" placeholder="0.00" min="0.01" step="0.01" />
          </div>
          <div class="form-group">
            <label for="rent-day">Day of month</label>
            <input type="number" id="rent-day" min="1" max="31" value="1" />
          </div>
        </div>
        <button class="save-rec-btn" id="rent-save-btn" onclick="saveRent()">Save Rent</button>
      </div>

      <!-- Other recurring -->
      <div class="rec-section">
        <div class="rec-section-head">
          <span class="rec-section-title">📋 Other Recurring</span>
        </div>
        <div id="other-rules-list"></div>
        <div class="rec-add-form">
          <div class="rec-add-title" id="other-add-title">Add recurring transaction</div>
          <div class="form-grid">
            <div class="form-group full">
              <label for="other-label">Label</label>
              <input type="text" id="other-label" placeholder="e.g. Netflix" maxlength="40" />
            </div>
            <div class="form-group">
              <label for="other-amount">Amount ($)</label>
              <input type="number" id="other-amount" placeholder="0.00" min="0.01" step="0.01" />
            </div>
            <div class="form-group">
              <label for="other-day">Day of month</label>
              <input type="number" id="other-day" min="1" max="31" placeholder="1" />
            </div>
            <div class="form-group full">
              <label>Type</label>
              <div class="type-toggle">
                <button class="type-btn active expense" id="other-btn-expense" onclick="setOtherType('expense')">↓ Expense</button>
                <button class="type-btn income"         id="other-btn-income"  onclick="setOtherType('income')">↑ Income</button>
              </div>
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="save-rec-btn" id="other-save-btn" onclick="saveOther()">Add</button>
            <button class="save-rec-btn" id="other-cancel-btn" onclick="cancelEditOther()" style="display:none;background:var(--text-muted)">Cancel</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Transaction List -->
  <div class="card">
    <div class="list-header card-title">
      Transactions
      <button class="clear-btn" onclick="clearAll()">Clear all</button>
    </div>
    <div class="tx-tabs">
      <button class="tx-tab active" id="tab-all" onclick="setTxTab('all')">All</button>
      <button class="tx-tab" id="tab-rec" onclick="setTxTab('recurring')">🔁 Recurring</button>
    </div>
    <div id="tx-container"></div>
  </div>

</div>

<script>
  const CATEGORIES = {
    income:  ['Salary','Freelance','Investment','Gift','Refund','Other'],
    expense: ['Food','Housing','Transport','Healthcare','Entertainment','Shopping','Utilities','Education','Other']
  };

  const ICONS = {
    Salary:'💼', Freelance:'💻', Investment:'📈', Gift:'🎁', Refund:'↩️',
    Food:'🍔', Housing:'🏠', Transport:'🚗', Healthcare:'💊',
    Entertainment:'🎬', Shopping:'🛍️', Utilities:'⚡', Education:'📚',
    Other:'📌'
  };

  let entries = JSON.parse(localStorage.getItem('budget-entries') || '[]');
  let currentType = 'income';

  // ── Recurring state ──
  let recurringConfig = JSON.parse(localStorage.getItem('budget-recurring-config') || JSON.stringify({
    salary: { enabled: false, label: 'Salary', amount: 0, timing: 'last-working-day', day: 25, createdYM: null },
    rent:   { enabled: false, amount: 0, day: 1, createdYM: null },
    others: []
  }));
  let recurringLog = JSON.parse(localStorage.getItem('budget-recurring-log') || '{}');
  let currentTab       = 'all';
  let editingOtherId   = null;   // null = adding new; set to rule.id when editing
  let otherFormType    = 'expense';

  function save() {
    localStorage.setItem('budget-entries', JSON.stringify(entries));
  }

  function saveRecurringConfig() {
    localStorage.setItem('budget-recurring-config', JSON.stringify(recurringConfig));
  }
  function saveRecurringLog() {
    localStorage.setItem('budget-recurring-log', JSON.stringify(recurringLog));
  }

  // ── Date helpers ──
  function toYM(date) {
    return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
  }
  function clampDay(year, month, day) {
    return Math.min(day, new Date(year, month + 1, 0).getDate());
  }
  function lastWorkingDay(year, month) {
    let d = new Date(year, month + 1, 0);
    while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() - 1);
    return d;
  }

  // ── Recurring check engine ──
  function checkAndApplyRecurring() {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const added = [];

    // Check the last 7 months (6 back + current) to catch missed payments
    for (let i = 6; i >= 0; i--) {
      const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
      const y = d.getFullYear(), m = d.getMonth();
      const ym = toYM(d);

      // ── Salary ──
      const sal = recurringConfig.salary;
      if (sal.enabled && sal.amount > 0 && sal.createdYM && ym >= sal.createdYM) {
        const logKey = 'salary-' + ym;
        if (!recurringLog[logKey]) {
          const due = sal.timing === 'last-working-day'
            ? lastWorkingDay(y, m)
            : new Date(y, m, clampDay(y, m, sal.day));
          due.setHours(8, 0, 0, 0);
          if (due <= today) {
            entries.push({
              id: due.getTime(),
              type: 'income',
              desc: sal.label || 'Salary',
              amount: sal.amount,
              category: 'Salary',
              date: due.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
              recurring: true,
              recurringRule: 'salary'
            });
            recurringLog[logKey] = true;
            added.push((sal.label || 'Salary') + ' ' + fmt(sal.amount));
          }
        }
      }

      // ── Rent ──
      const rent = recurringConfig.rent;
      if (rent.enabled && rent.amount > 0 && rent.createdYM && ym >= rent.createdYM) {
        const logKey = 'rent-' + ym;
        if (!recurringLog[logKey]) {
          const due = new Date(y, m, clampDay(y, m, rent.day));
          due.setHours(9, 0, 0, 0);
          if (due <= today) {
            entries.push({
              id: due.getTime(),
              type: 'expense',
              desc: 'Rent',
              amount: rent.amount,
              category: 'Housing',
              date: due.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
              recurring: true,
              recurringRule: 'rent'
            });
            recurringLog[logKey] = true;
            added.push('Rent ' + fmt(rent.amount));
          }
        }
      }

      // ── Others ──
      recurringConfig.others.forEach(function(rule) {
        if (!rule.createdYM || ym < rule.createdYM) return;
        const logKey = 'other-' + rule.id + '-' + ym;
        if (!recurringLog[logKey]) {
          const due = new Date(y, m, clampDay(y, m, rule.day));
          due.setHours(10, 0, 0, rule.id % 1000);
          if (due <= today) {
            entries.push({
              id: due.getTime(),
              type: rule.type,
              desc: rule.label,
              amount: rule.amount,
              category: 'Other',
              date: due.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
              recurring: true,
              recurringRule: 'other-' + rule.id
            });
            recurringLog[logKey] = true;
            added.push(rule.label + ' ' + fmt(rule.amount));
          }
        }
      });
    }

    if (added.length) {
      entries.sort(function(a, b) { return b.id - a.id; });
      save();
      saveRecurringLog();
      const count = added.length;
      showBanner('✅ ' + count + ' recurring transaction' + (count > 1 ? 's' : '') + ' added: ' + added.join(', '));
      render();
    }
  }

  // ── Notification banner ──
  function showBanner(text) {
    document.getElementById('rec-banner-text').textContent = text;
    document.getElementById('rec-banner').style.display = 'flex';
  }
  function dismissBanner() {
    document.getElementById('rec-banner').style.display = 'none';
  }

  // ── Recurring settings panel toggle ──
  function toggleRecurringPanel() {
    const panel   = document.getElementById('rec-panel');
    const chevron = document.getElementById('rec-chevron');
    const head    = document.getElementById('rec-card-head');
    const open    = panel.style.display === 'none';
    panel.style.display   = open ? '' : 'none';
    chevron.classList.toggle('open', open);
    head.classList.toggle('open', open);
  }

  // ── Salary form ──
  function populateSalaryForm() {
    const sal = recurringConfig.salary;
    document.getElementById('salary-enabled').checked = sal.enabled;
    document.getElementById('salary-label').value     = sal.label || 'Salary';
    document.getElementById('salary-amount').value    = sal.amount || '';
    document.getElementById('salary-timing').value    = sal.timing || 'last-working-day';
    document.getElementById('salary-day').value       = sal.day || '';
    updateSalaryTimingUI();
  }
  function updateSalaryTimingUI() {
    const timing = document.getElementById('salary-timing').value;
    document.getElementById('salary-day-group').style.display =
      timing === 'specific-day' ? '' : 'none';
  }
  function saveSalary() {
    const enabled = document.getElementById('salary-enabled').checked;
    const label   = document.getElementById('salary-label').value.trim() || 'Salary';
    const amount  = parseFloat(document.getElementById('salary-amount').value);
    const timing  = document.getElementById('salary-timing').value;
    const day     = parseInt(document.getElementById('salary-day').value, 10);

    if (enabled) {
      if (!amount || amount <= 0) { shake('salary-amount'); return; }
      if (timing === 'specific-day' && (!day || day < 1 || day > 31)) { shake('salary-day'); return; }
    }

    const wasEnabled  = recurringConfig.salary.enabled;
    const hadCreatedYM = recurringConfig.salary.createdYM;

    recurringConfig.salary = {
      enabled,
      label,
      amount: amount || 0,
      timing,
      day: day || 25,
      // Set createdYM the first time it's enabled, or reset it if re-enabling after being off
      createdYM: enabled
        ? (hadCreatedYM && wasEnabled ? hadCreatedYM : toYM(new Date()))
        : (hadCreatedYM || null)
    };
    saveRecurringConfig();
    flashBtn('salary-save-btn');
  }

  // ── Rent form ──
  function populateRentForm() {
    const rent = recurringConfig.rent;
    document.getElementById('rent-enabled').checked = rent.enabled;
    document.getElementById('rent-amount').value    = rent.amount || '';
    document.getElementById('rent-day').value       = rent.day || 1;
  }
  function saveRent() {
    const enabled = document.getElementById('rent-enabled').checked;
    const amount  = parseFloat(document.getElementById('rent-amount').value);
    const day     = parseInt(document.getElementById('rent-day').value, 10) || 1;

    if (enabled) {
      if (!amount || amount <= 0) { shake('rent-amount'); return; }
    }

    const wasEnabled   = recurringConfig.rent.enabled;
    const hadCreatedYM = recurringConfig.rent.createdYM;

    recurringConfig.rent = {
      enabled,
      amount: amount || 0,
      day,
      createdYM: enabled
        ? (hadCreatedYM && wasEnabled ? hadCreatedYM : toYM(new Date()))
        : (hadCreatedYM || null)
    };
    saveRecurringConfig();
    flashBtn('rent-save-btn');
  }

  // ── Other recurring rules ──
  function renderOtherRules() {
    const list = document.getElementById('other-rules-list');
    if (!recurringConfig.others.length) {
      list.innerHTML = '';
      return;
    }
    list.innerHTML = recurringConfig.others.map(function(rule) {
      const typeLabel = rule.type === 'income'
        ? '<span style="color:var(--green)">↑ Income</span>'
        : '<span style="color:var(--red)">↓ Expense</span>';
      return '<div class="rec-rule-item">' +
        '<div class="rec-rule-info">' +
          '<div class="rec-rule-label">' + escHtml(rule.label) + '</div>' +
          '<div class="rec-rule-meta">' + typeLabel + ' · ' + fmt(rule.amount) + ' · Day ' + rule.day + '</div>' +
        '</div>' +
        '<div class="rec-rule-actions">' +
          '<button class="rec-edit-btn" onclick="editOther(' + rule.id + ')" title="Edit">✎</button>' +
          '<button class="rec-del-btn"  onclick="deleteOther(' + rule.id + ')" title="Delete">✕</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function setOtherType(type) {
    otherFormType = type;
    document.getElementById('other-btn-income').classList.toggle('active', type === 'income');
    document.getElementById('other-btn-income').classList.toggle('income', type === 'income');
    document.getElementById('other-btn-expense').classList.toggle('active', type === 'expense');
    document.getElementById('other-btn-expense').classList.toggle('expense', type === 'expense');
  }

  function saveOther() {
    const label  = document.getElementById('other-label').value.trim();
    const amount = parseFloat(document.getElementById('other-amount').value);
    const day    = parseInt(document.getElementById('other-day').value, 10);

    if (!label)                       { shake('other-label');  return; }
    if (!amount || amount <= 0)       { shake('other-amount'); return; }
    if (!day || day < 1 || day > 31)  { shake('other-day');    return; }

    if (editingOtherId !== null) {
      // Update existing rule, preserving createdYM
      const idx = recurringConfig.others.findIndex(function(r) { return r.id === editingOtherId; });
      if (idx !== -1) {
        recurringConfig.others[idx] = {
          id:        recurringConfig.others[idx].id,
          label,
          amount,
          day,
          type:      otherFormType,
          createdYM: recurringConfig.others[idx].createdYM
        };
      }
    } else {
      recurringConfig.others.push({
        id:        Date.now(),
        label,
        amount,
        day,
        type:      otherFormType,
        createdYM: toYM(new Date())
      });
    }

    saveRecurringConfig();
    renderOtherRules();
    clearOtherForm();
  }

  function editOther(id) {
    const rule = recurringConfig.others.find(function(r) { return r.id === id; });
    if (!rule) return;
    editingOtherId = id;
    document.getElementById('other-label').value  = rule.label;
    document.getElementById('other-amount').value = rule.amount;
    document.getElementById('other-day').value    = rule.day;
    setOtherType(rule.type);
    document.getElementById('other-add-title').textContent = 'Edit recurring transaction';
    document.getElementById('other-save-btn').textContent  = 'Save';
    document.getElementById('other-cancel-btn').style.display = '';
  }

  function deleteOther(id) {
    recurringConfig.others = recurringConfig.others.filter(function(r) { return r.id !== id; });
    saveRecurringConfig();
    renderOtherRules();
    if (editingOtherId === id) cancelEditOther();
  }

  function cancelEditOther() {
    editingOtherId = null;
    clearOtherForm();
  }

  function clearOtherForm() {
    editingOtherId = null;
    document.getElementById('other-label').value  = '';
    document.getElementById('other-amount').value = '';
    document.getElementById('other-day').value    = '';
    setOtherType('expense');
    document.getElementById('other-add-title').textContent    = 'Add recurring transaction';
    document.getElementById('other-save-btn').textContent     = 'Add';
    document.getElementById('other-cancel-btn').style.display = 'none';
  }

  // ── Tab switching ──
  function setTxTab(tab) {
    currentTab = tab;
    document.getElementById('tab-all').classList.toggle('active', tab === 'all');
    document.getElementById('tab-rec').classList.toggle('active', tab === 'recurring');
    render();
  }

  // ── Flash a save button green briefly ──
  function flashBtn(id) {
    const btn = document.getElementById(id);
    btn.classList.add('success');
    btn.textContent = 'Saved ✓';
    setTimeout(function() {
      btn.classList.remove('success');
      btn.textContent = id.startsWith('salary') ? 'Save Salary'
                      : id.startsWith('rent')   ? 'Save Rent'
                      : 'Save';
    }, 1400);
  }

  function fmt(n) {
    return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function setType(type) {
    currentType = type;
    document.getElementById('btn-income').classList.toggle('active', type === 'income');
    document.getElementById('btn-expense').classList.toggle('active', type === 'expense');
    populateCategories();
  }

  function populateCategories() {
    const sel = document.getElementById('category');
    sel.innerHTML = CATEGORIES[currentType].map(c => `<option value="${c}">${c}</option>`).join('');
  }

  function addEntry() {
    const desc   = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const cat    = document.getElementById('category').value;

    if (!desc)          { shake('desc');   return; }
    if (!amount || amount <= 0) { shake('amount'); return; }

    entries.unshift({
      id: Date.now(),
      type: currentType,
      desc,
      amount,
      category: cat,
      date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
    });

    save();
    document.getElementById('desc').value   = '';
    document.getElementById('amount').value = '';
    render();
  }

  function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    save();
    render();
  }

  function clearAll() {
    if (!entries.length) return;
    if (confirm('Delete all transactions? This cannot be undone.')) {
      entries = [];
      save();
      render();
    }
  }

  function shake(id) {
    const el = document.getElementById(id);
    el.style.borderColor = 'var(--red)';
    el.style.animation = 'none';
    requestAnimationFrame(() => {
      el.style.animation = 'shake .35s ease';
    });
    setTimeout(() => { el.style.borderColor = ''; el.style.animation = ''; }, 600);
  }

  function render() {
    // Global totals always use ALL entries (unaffected by tab filter)
    const totalIncome  = entries.filter(e => e.type === 'income').reduce((s,e) => s + e.amount, 0);
    const totalExpense = entries.filter(e => e.type === 'expense').reduce((s,e) => s + e.amount, 0);
    const balance      = totalIncome - totalExpense;

    const balEl = document.getElementById('balance');
    balEl.textContent = (balance < 0 ? '-' : '') + fmt(balance);
    balEl.className = 'balance-amount ' + (balance > 0 ? 'positive' : balance < 0 ? 'negative' : 'zero');

    document.getElementById('total-income').textContent  = fmt(totalIncome);
    document.getElementById('total-expense').textContent = fmt(totalExpense);

    // Apply tab filter for display
    const displayEntries = currentTab === 'recurring'
      ? entries.filter(e => e.recurring)
      : entries;

    const container = document.getElementById('tx-container');
    if (!displayEntries.length) {
      container.innerHTML = currentTab === 'recurring'
        ? `<div class="empty-state"><div class="empty-icon">🔁</div><p>No recurring transactions yet.<br>Set them up in the panel above!</p></div>`
        : `<div class="empty-state"><div class="empty-icon">💳</div><p>No transactions yet.<br>Add your first one above!</p></div>`;
      return;
    }

    // Group entries by month using the id timestamp
    const groups = {};
    displayEntries.forEach(e => {
      const d   = new Date(e.id);
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      if (!groups[key]) {
        groups[key] = {
          label:   d.toLocaleString('default', { month: 'long', year: 'numeric' }),
          entries: [],
          income:  0,
          expense: 0
        };
      }
      groups[key].entries.push(e);
      if (e.type === 'income') groups[key].income  += e.amount;
      else                     groups[key].expense += e.amount;
    });

    // Most recent month first
    const sortedKeys = Object.keys(groups).sort().reverse();

    container.innerHTML = sortedKeys.map(key => {
      const g       = groups[key];
      const net     = g.income - g.expense;
      const netClass = net > 0 ? 'positive' : net < 0 ? 'negative' : '';
      const netSign  = net >= 0 ? '+' : '−';

      const rows = g.entries.map(e => `
      <div class="tx-item">
        <div class="tx-icon ${e.type}">${ICONS[e.category] || '📌'}</div>
        <div class="tx-meta">
          <div class="tx-desc">${escHtml(e.desc)}</div>
          <div class="tx-detail">${e.recurring ? '🔁 · ' : ''}${e.category} · ${e.date}</div>
        </div>
        <div class="tx-right">
          <span class="tx-amount ${e.type}">${e.type === 'income' ? '+' : '−'}${fmt(e.amount)}</span>
          <button class="del-btn" onclick="deleteEntry(${e.id})" title="Delete">✕</button>
        </div>
      </div>`).join('');

      return `
      <div class="month-group">
        <div class="month-header">
          <span class="month-label">${g.label}</span>
          <span class="month-stats">
            <span class="ms-income">↑ ${fmt(g.income)}</span>
            <span class="ms-expense">↓ ${fmt(g.expense)}</span>
            <span class="ms-net ${netClass}">Net ${netSign}${fmt(Math.abs(net))}</span>
          </span>
        </div>
        <div class="tx-list">${rows}</div>
      </div>`;
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Add shake keyframe dynamically
  const style = document.createElement('style');
  style.textContent = `@keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }`;
  document.head.appendChild(style);

  // Init
  populateCategories();
  render();
  populateSalaryForm();
  populateRentForm();
  renderOtherRules();
  checkAndApplyRecurring();

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.target.id === 'desc' || e.target.id === 'amount')) {
      addEntry();
    }
  });
</script>
</body>
</html>
